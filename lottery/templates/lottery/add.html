{% extends 'users/base.html' %}
{% load static %}
{% block title %}Add promo{% endblock %}
{% block content %}
<form id="form">
    {% csrf_token %}
    {{ form.code.label }}
    {{ form.code }}

    

    <div class="message"></div>
    <div class="form__bottom">
        <a class="register__button" href="{% url 'lottery' %}">My promocodes</a>
        <button type="submit" id="login-btn" class="button">Send</button>
    </div>
    <div id="loading-overlay">
        <div id="loading-spinner"></div>
    </div>
    
</form>

<script>
    $(document).ready(function(){
        $("#login-btn").click(function(e){
            e.preventDefault();
            $("#loading-overlay").fadeIn();
            var formData = $("#form").serialize();
            $.ajax({
                type: 'POST',
                url: '/lottery/add-promocode-ajax/',
                dataType: 'json',
                data: formData,
                success: function(response){
                    console.log(response);
                    $('.message').css('display', 'block')
                    $('.message').text(response.message).css('color','green')
                    window.location.href = response.url
                    $("#loading-overlay").fadeOut();
                },
                error: function(error){
                    console.log(error);
                    $('.message').css('display', 'block')
                    $('.message').text(JSON.parse(error.responseText).message).css('color','purple');
                    $("#loading-overlay").fadeOut();
                }
            });
        });
    });
</script>

{% endblock %}
